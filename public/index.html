<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="/style.css" />
  <title>Party Snake</title>
</head>
<body>
  <main class="wrap">
    <h1>Party Snake</h1>

    <input id="name" placeholder="Dein Name" maxlength="32" />
    <button id="start">Start</button>

    <p><a href="/leaderboard">Leaderboard</a></p>

    <!-- Optional: Reset für Tests -->
    <button id="reset">Reset (nur Test)</button>
    <div class="small">Reset löscht nur den "schon gespielt"-Flag in deinem Browser.</div>
  </main>

  <script>
    const input = document.getElementById("name");
    const btn = document.getElementById("start");
    const reset = document.getElementById("reset");

    input.value = localStorage.getItem("playerName") || "";

    btn.onclick = () => {
      const name = input.value.trim();
      if (!name) return;
      localStorage.setItem("playerName", name);
      location.href = "/play";
    };

    reset.onclick = () => {
      localStorage.removeItem("hasPlayed");
      alert("Reset: hasPlayed entfernt.");
    };
  </script>
</body>
</html>
